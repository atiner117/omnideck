name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · test · build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri 2 webview deps (WebKitGTK 4.1). Keep in sync with README "Requirements".
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libudev-dev \
            pkg-config \
            build-essential curl wget file libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Svelte type-check
        run: bun run check

      - name: Frontend build
        run: bun run build

      - name: clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --release

      - name: Tauri build (no bundle)
        run: bun run tauri build --no-bundle

  cargo-deny:
    name: cargo-deny (advisories · licenses · bans · sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ./src-tauri/Cargo.toml

  cargo-audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit
