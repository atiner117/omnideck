# cargo-deny config — supply-chain gate for OmniDeck (run in CI).
# Checks: advisories (RustSec), licenses (GPL-3.0-compat), bans, sources.
# Regenerate the license allow-list when adding deps:
#   cargo metadata --format-version 1 | jq -r '.packages[].license'

[advisories]
version = 2
# RustSec vulnerabilities + unsound advisories error by default in v2.
# Unmaintained: only fail for OUR direct dependencies. The transitive tree is pinned by
# Tauri v2's Linux stack (gtk-rs GTK3 bindings ×10, unic-* via tauri's templating,
# proc-macro-error) — unfixable until Tauri moves to GTK4; enumerating those advisories
# as ignores would just rot. Real vulnerabilities still fail regardless of depth
# (cargo-audit caught quinn-proto RUSTSEC-2026-0185 on this gate's first CI run).
unmaintained = "workspace"
# quick-xml 0.39 DoS advisories (2026-06-29): pulled only via plist (tauri-utils' macOS
# Info.plist parser) — no untrusted XML reaches it in a Linux launcher. No fixed release
# exists yet on our tree (needs plist > 1.9.0 to allow quick-xml 0.41). Mirror of
# .cargo/audit.toml — DROP BOTH when `cargo update -p plist` moves quick-xml to >= 0.41.
ignore = [
    { id = "RUSTSEC-2026-0194", reason = "quick-xml via plist: unreachable with untrusted input; awaiting plist release with quick-xml 0.41" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml via plist: unreachable with untrusted input; awaiting plist release with quick-xml 0.41" },
]

[licenses]
version = 2
confidence-threshold = 0.9
# Every SPDX id observed in the current dependency tree. All are permissive or
# weak-copyleft and compatible with OmniDeck's GPL-3.0-or-later license.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "GPL-3.0-or-later",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
exceptions = []

[bans]
# Large transitive trees legitimately carry duplicate versions; surface, don't fail.
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
